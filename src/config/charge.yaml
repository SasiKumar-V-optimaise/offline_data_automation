charge:
  hopper_history:
    schema: ops_config
    table: hopper_raw_material_history
    timestamp_column: date_time

  material_master:
    schema: plant_master
    table: materials
    code_column: material_code
    name_column: material_name
    active_column: is_active

  target:
    schema: offline_feed
    table: charge_data
    upsert_mode: delete_insert
    conflict_cols: [date_time]

  import_batch:
    schema: ingest
    table: import_batches
    source_type: excel
    domain: charge
    parser_name: charge_report

  material_column_overrides:
    pci_1: pci_mt
