rm:
  output:
    dir: output/rm
    filename: rm_processed_data.xlsx

  run_date_format: "%d-%b-%Y"

  shifts:
    valid: [A, B, C]
    priority: {C: 0, A: 1, B: 2}
    time:     {A: "07:00", B: "15:00", C: "23:00"}

  invalid_markers: [STOP, "N/A", NA, n/a, na, "-", ""]

  neon:
    schema: offline_feed
    upsert_mode: delete_insert
    conflict_cols: [material_code, date_time]
    material_master:
      schema: plant_master
      table: materials
      code_column: material_code
      active_column: is_active
    category_map:
      "fuel coke online":      {table: fuel_chemistry,   material_code: coke_1}
      "fuel coke offline":     {table: fuel_chemistry,   material_code: coke_2}
      "fuel nut coke online":  {table: fuel_chemistry,   material_code: nut_coke_1}
      "fuel nut coke offline": {table: fuel_chemistry,   material_code: nut_coke_2}
      "fuel pci":              {table: fuel_chemistry,   material_code: pci_1}

      "flux 1":                {table: flux_chemistry,   material_code: flux_1}
      "flux 2":                {table: flux_chemistry,   material_code: flux_2}
      "flux 3":                {table: flux_chemistry,   material_code: flux_3}

      "sinter sp 02 online":   {table: sinter_chemistry, material_code: sinter_3}
      "sinter sp 02 offline":  {table: sinter_chemistry, material_code: sinter_4}

      "ore 1":                 {table: ore_chemistry,    material_code: ore_1}
      "ore 2":                 {table: ore_chemistry,    material_code: ore_2}
      "ore 3":                 {table: ore_chemistry,    material_code: ore_3}
      "ore 4":                 {table: ore_chemistry,    material_code: ore_4}
      "ore 5":                 {table: ore_chemistry,    material_code: ore_5}
      "ore 6":                 {table: ore_chemistry,    material_code: ore_6}
      "ore 7":                 {table: ore_chemistry,    material_code: ore_7}
      "ore 8":                 {table: ore_chemistry,    material_code: ore_8}
      "ore 9":                 {table: ore_chemistry,    material_code: ore_9}
      "ore 10":                {table: ore_chemistry,    material_code: ore_10}
      "ore 11":                {table: ore_chemistry,    material_code: ore_11}
      "ore 12":                {table: ore_chemistry,    material_code: ore_12}

      "ore pellet 1":          {table: ore_chemistry,    material_code: pellet_1}
      "ore pellet 2":          {table: ore_chemistry,    material_code: pellet_2}

  influx:
    measurement: rm_updated_data
    rename_fields:
      Date: date
      COKE_%ASHDB_ON: coke_pct_ashdb_on
      COKE_%FCDB_ON: coke_pct_fcdb_on
